<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbería Prestige - Turnos</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="preload" href="css/normalize.css">
</head>

<body>
    <header class="titulo-principal">
        <h1><img src="/img/logo/CABRERA-SIN FONDO_BLANCO.png" alt="Logo-de-barberia"></h1>
        <p class="Ubicacion-local">Mendoza, Argentina</p>
    </header>

    <div class="container">
        <div id="main-menu">
            <button class="link-button boton fade-in" id="btn_form" 
            onclick="window.open('https://turnito.app/c/emanuelcabrera', '_blank')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Agendar Turno
            </button>
            <button class="link-button boton fade-in" id="btn_instagram" 
            onclick="window.open('https://www.instagram.com/emanuelcabrera.art/', '_blank')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                Ver Trabajos
            </button>
            <button class="link-button boton fade-in" id="btn_ubi" 
            onclick="window.open('https://www.google.com/maps/place/Peluqueria+Emanuel+Cabrera/@-32.9159864,-68.8642972,17z/data=!3m1!4b1!4m6!3m5!1s0x967e09007d0f0f59:0x2cbb5ae17d8a9d57!8m2!3d-32.9159864!4d-68.8617223!16s%2Fg%2F11x8q_6ft2?entry=ttu&g_ep=EgoyMDI2MDMxOC4xIKXMDSoASAFQAw%3D%3D', '_blank')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>
                Cómo llegar
            </button>
            <button class="link-button boton fade-in" id="btn_contact" 
            onclick="redirigirWhatsApp()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Mensaje Directo a WhatsApp
            </button>
        </div>
    </div>

    <section class="info-section">
        <div class="info-item">
            <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg> Horarios</h4>
            <p>Lunes a Sábado<br>10:00 - 18:00</p>
        </div>
        <div class="info-item">
            <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg> Dirección</h4>
            <p>Derqui 1507<br>Godoy Cruz, Mendoza</p>
        </div>
        <div class="info-item">
            <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                    </path>
                </svg> Contacto</h4>
            <p>+54 9 261 575 1537</p>
        </div>
    </section>

<script>
    function redirigirWhatsApp() {
        const numeroTelefono = "5492615751537"; 
        const mensaje = "Hola, me gustaría agendar un turno, te escribo desde la web."; // Mensaje predefinido
        const url = `https://wa.me/${numeroTelefono}?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
    }
</script>

</body>

<footer>
    <p>&copy; 2026 Cabrera Colorimetría Extrema</p>
</footer>

</html>
