<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbería Prestige - Turnos</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="preload" href="css/normalize.css">
</head>

<body>
    <header class="titulo-principal">
        <h1>BARBERÍA PRESTIGE</h1>
        <p class="Ubicacion-local">Mendoza, Argentina</p>
    </header>

    <div class="container">
        <div id="main-menu">
            <button class="link-button boton fade-in" onclick="abrirFormulario()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Agendar Turno
            </button>
            <button class="link-button boton fade-in">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                Ver Trabajos
            </button>
            <button class="link-button boton fade-in">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>
                Cómo llegar
            </button>
        </div>

        <div id="form-container">
            <div class="form-header">
                <h2 style="font-size: 1.2rem;">Reserva tu lugar</h2>
                <button class="close-btn" onclick="cerrarFormulario()">✕</button>
            </div>
            <form id="appointmentForm">
                <label>Nombre y Apellido</label>
                <input type="text" id="nombre_completo" placeholder="Ej: Juan Pérez" required>

                <label>Fecha y Hora</label>
                <input type="datetime-local" id="fecha_hora" required>
                <small id="error-horario" class="error-message"
                    style="display: none; color: #ff4d4d; margin-top: 5px; font-size: 0.8rem;"></small>

                <label>WhatsApp</label>
                <input type="tel" id="whatsapp" placeholder="261...">

                <label>Correo</label>
                <input type="email" id="correo" placeholder="alguien@example.com">

                <button type="submit" id="submit-btn" class="submit-btn">CONFIRMAR TURNO</button>
            </form>
        </div>
    </div>

    <section class="info-section">
        <div class="info-item">
            <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg> Horarios</h4>
            <p>Lunes a Sábado<br>10:00 - 18:00</p>
        </div>
        <div class="info-item">
            <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg> Dirección</h4>
            <p>Av. Siempre Viva 742<br>Güemes, Mendoza</p>
        </div>
        <div class="info-item">
            <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                    </path>
                </svg> Contacto</h4>
            <p>+54 261 123 4567</p>
        </div>
    </section>

</body>

<footer>
    <p>&copy; 2026 Peluquería prestige</p>
</footer>

<div id="custom-modal" class="modal-overlay">
    <div class="modal-box">
        <p>¿Deseas cerrar el formulario?<br>
            <span>Los datos no se guardarán.</span>
        </p>

        <div class="modal-actions">
            <button id="confirm-close" class="modal-btn primary">Aceptar</button>
            <button id="cancel-close" class="modal-btn secondary">Cancelar</button>
        </div>
    </div>
</div>





<script>
    const formContainer = document.getElementById('form-container');
    const mainMenu = document.getElementById('main-menu');
    const inputFecha = document.getElementById('fecha_hora');
    const errorMsg = document.getElementById('error-horario');
    const submitBtn = document.getElementById('submit-btn');

    // Función para abrir/cerrar
    function abrirFormulario() {
        mainMenu.style.display = 'none';
        formContainer.classList.add("active");

        // Configurar fecha mínima (hoy)
        const hoy = new Date().toISOString().slice(0, 16);
        inputFecha.min = hoy;
    }

    /*cartel para salir de formulario*/

    function cerrarFormulario() {
        abrirModalConfirmacion();
    }
    const modal = document.getElementById("custom-modal");
    const confirmClose = document.getElementById("confirm-close");
    const cancelClose = document.getElementById("cancel-close");

    function abrirModalConfirmacion() {
        const modal = document.getElementById("custom-modal");
        modal.style.pointerEvents = "all"; // Fuerza la interacción
        modal.classList.add("active");

        // Aseguramos que la caja escale correctamente
        const modalBox = modal.querySelector(".modal-box");
        modalBox.style.opacity = "1";
        modalBox.style.transform = "scale(1)";
    }
    function cerrarModal() {
        modal.classList.add("closing");

        setTimeout(() => {
            modal.classList.remove("active", "closing");
        }, 250);
    }


    cancelClose.addEventListener("click", cerrarModal);

    confirmClose.addEventListener("click", () => {
        cerrarModal();

        setTimeout(() => {
            formContainer.classList.remove('active');
            mainMenu.style.display = 'block';
            document.getElementById('appointmentForm').reset();
        }, 250);
    });

    // Validación de rango horario (9 a 18)
    inputFecha.addEventListener('input', (e) => {
        const date = new Date(e.target.value);
        const hour = date.getHours();

        const errorMsg = document.getElementById('error-horario');

        if (hour < 9 || hour >= 18) {
            errorMsg.textContent = "⚠️ Seleccioná un horario entre las 09:00 y las 18:00.";
            errorMsg.style.display = "block";
            e.target.classList.add("input-error");
            submitBtn.disabled = true;
        } else {
            errorMsg.style.display = "none";
            e.target.classList.remove("input-error");
            submitBtn.disabled = false;
        }
    });

    // Envío a n8n
    document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const payload = {
            cliente: document.getElementById('nombre_completo').value,
            fecha_hora: document.getElementById('fecha_hora').value,
            telefono: document.getElementById('whatsapp').value
        };

        console.log("Enviando a n8n...", payload);
        alert("Enviando datos... n8n se encargará de agendar en Google Calendar.");


    });
</script>
</body>

</html>
